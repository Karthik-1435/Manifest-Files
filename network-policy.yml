---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-phpapp-to-mysql-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: php-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: php-app
          ports:
            - protocol: TCP
              port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: php-db
          ports:
            - protocol: TCP
              port: 3306
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
          ports:
            - protocol: UDP
              port: 53
  
